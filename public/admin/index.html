<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Rincones Bari — Panel de Contenido</title>
</head>
<body>
  <div id="diag" style="padding:20px;font-family:monospace;background:#f5f5f5;margin:20px;border-radius:8px;">
    <h3>Cargando panel...</h3>
    <div id="log"></div>
  </div>
  <script>
    function log(msg, color) {
      var el = document.createElement('div');
      el.style.color = color || '#333';
      el.style.marginBottom = '4px';
      el.textContent = new Date().toISOString().slice(11,19) + ' — ' + msg;
      document.getElementById('log').appendChild(el);
    }
    log('HTML cargado OK');
    window.onerror = function(msg, src, line) {
      log('ERROR JS: ' + msg + ' (línea ' + line + ')', 'red');
    };
  </script>
  <script
    src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"
    onload="log('Decap CMS cargado OK', 'green')"
    onerror="log('ERROR: no se pudo cargar el script de Decap CMS', 'red')"
  ></script>
</body>
</html>
