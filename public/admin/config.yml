backend:
  name: github
  repo: jmpazblanes-art/rincones-bari
  branch: master
  auth_scope: repo
  base_url: https://api.netlify.com
  auth_endpoint: auth

# Donde se suben las imágenes
media_folder: public/images/uploads
public_folder: /images/uploads

# Idioma del panel
locale: es

# Colecciones de contenido
collections:

  # ─────────────────────────────────────────────
  # 1. GALERÍA DE IMÁGENES
  # ─────────────────────────────────────────────
  - name: galeria_salon
    label: "🛋️ Salón"
    label_singular: "Foto de Salón"
    folder: content/galeria/salon
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título SEO", name: title, widget: string, hint: "Describe la foto para Google (ej: Salón moderno con sofá en lino y tonos neutros)" }
      - { label: "Texto alternativo (Alt)", name: alt, widget: string, hint: "Descripción corta para accesibilidad y SEO" }
      - { label: "Foto", name: image, widget: image, hint: "Sube la foto aquí. Formatos: JPG, PNG, WebP" }
      - { label: "Descripción", name: description, widget: text, required: false, hint: "Descripción larga para la página de detalle (opcional)" }
      - { label: "Búsqueda Amazon", name: affiliate_query, widget: string, required: false, hint: "Palabras clave para buscar productos en Amazon (ej: sofá gris lino)" }

  - name: galeria_cocinas
    label: "🍳 Cocinas"
    label_singular: "Foto de Cocina"
    folder: content/galeria/cocinas
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título SEO", name: title, widget: string }
      - { label: "Texto alternativo (Alt)", name: alt, widget: string }
      - { label: "Foto", name: image, widget: image }
      - { label: "Descripción", name: description, widget: text, required: false }
      - { label: "Búsqueda Amazon", name: affiliate_query, widget: string, required: false }

  - name: galeria_banos
    label: "🛁 Baños"
    label_singular: "Foto de Baño"
    folder: content/galeria/banos
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título SEO", name: title, widget: string }
      - { label: "Texto alternativo (Alt)", name: alt, widget: string }
      - { label: "Foto", name: image, widget: image }
      - { label: "Descripción", name: description, widget: text, required: false }
      - { label: "Búsqueda Amazon", name: affiliate_query, widget: string, required: false }

  - name: galeria_habitaciones
    label: "🛏️ Habitaciones"
    label_singular: "Foto de Habitación"
    folder: content/galeria/habitaciones
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título SEO", name: title, widget: string }
      - { label: "Texto alternativo (Alt)", name: alt, widget: string }
      - { label: "Foto", name: image, widget: image }
      - { label: "Descripción", name: description, widget: text, required: false }
      - { label: "Búsqueda Amazon", name: affiliate_query, widget: string, required: false }

  - name: galeria_patios
    label: "🌿 Patios y Exteriores"
    label_singular: "Foto de Patio"
    folder: content/galeria/patios
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título SEO", name: title, widget: string }
      - { label: "Texto alternativo (Alt)", name: alt, widget: string }
      - { label: "Foto", name: image, widget: image }
      - { label: "Descripción", name: description, widget: text, required: false }
      - { label: "Búsqueda Amazon", name: affiliate_query, widget: string, required: false }

  - name: galeria_vestidor
    label: "👗 Vestidores"
    label_singular: "Foto de Vestidor"
    folder: content/galeria/vestidor
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título SEO", name: title, widget: string }
      - { label: "Texto alternativo (Alt)", name: alt, widget: string }
      - { label: "Foto", name: image, widget: image }
      - { label: "Descripción", name: description, widget: text, required: false }
      - { label: "Búsqueda Amazon", name: affiliate_query, widget: string, required: false }

  - name: galeria_despacho
    label: "💻 Despachos"
    label_singular: "Foto de Despacho"
    folder: content/galeria/despacho
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título SEO", name: title, widget: string }
      - { label: "Texto alternativo (Alt)", name: alt, widget: string }
      - { label: "Foto", name: image, widget: image }
      - { label: "Descripción", name: description, widget: text, required: false }
      - { label: "Búsqueda Amazon", name: affiliate_query, widget: string, required: false }

  - name: galeria_recibidores
    label: "🚪 Recibidores"
    label_singular: "Foto de Recibidor"
    folder: content/galeria/recibidores
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título SEO", name: title, widget: string }
      - { label: "Texto alternativo (Alt)", name: alt, widget: string }
      - { label: "Foto", name: image, widget: image }
      - { label: "Descripción", name: description, widget: text, required: false }
      - { label: "Búsqueda Amazon", name: affiliate_query, widget: string, required: false }

  # ─────────────────────────────────────────────
  # 2. BLOG / JOURNAL
  # ─────────────────────────────────────────────
  - name: blog
    label: "✍️ Blog / Journal"
    label_singular: "Artículo"
    folder: content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título del artículo", name: title, widget: string }
      - { label: "Slug (URL)", name: slug, widget: string, hint: "URL sin espacios ni acentos (ej: como-decorar-salon-pequeno)" }
      - { label: "Fecha de publicación", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Imagen de portada", name: cover_image, widget: image }
      - { label: "Resumen", name: excerpt, widget: text, hint: "2-3 frases que aparecen en la tarjeta del artículo" }
      - { label: "Categoría", name: category, widget: select, options: ["Salones", "Cocinas", "Baños", "Habitaciones", "Patios", "Vestidores", "Despachos", "Recibidores", "Decoración", "Estilo de vida"] }
      - { label: "Tiempo de lectura (minutos)", name: read_time, widget: number, default: 5 }
      - { label: "Contenido del artículo", name: body, widget: markdown }
      - { label: "Publicado", name: published, widget: boolean, default: true, hint: "Desactiva para guardar como borrador" }
